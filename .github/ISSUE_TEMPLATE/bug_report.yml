name: Bug report
description: Report a problem with dbos-transact-rust
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a code snippet that reproduces the issue.
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - SQLite
        - Postgres
        - Both / N/A
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Crate version or git commit.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
