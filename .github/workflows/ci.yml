name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: test (sqlite, no services)
        run: cargo test --workspace

  postgres:
    name: postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: dbos
          POSTGRES_PASSWORD: dbos
          POSTGRES_DB: dbos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dbos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DBOS_TEST_DATABASE_URL: postgres://dbos:dbos@localhost:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: test against postgres
        run: cargo test -p dbos-core -- --test-threads=4
